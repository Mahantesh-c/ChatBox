<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register — ChatApp</title>
    <meta name="description" content="Create a new ChatApp account." />
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <!-- Theme toggle -->
    <div class="auth-theme-wrap">
        <button class="theme-btn" id="themeBtn" title="Toggle theme"></button>
    </div>
    <div class="vh-center">
        <div class="glass-card auth-card">

            <!-- Icon -->
            <div class="auth-icon">
                <svg viewBox="0 0 24 24">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                    <circle cx="9" cy="7" r="4" />
                    <line x1="19" y1="8" x2="19" y2="14" />
                    <line x1="22" y1="11" x2="16" y2="11" />
                </svg>
            </div>

            <h1 class="auth-title">Create an account</h1>
            <p class="auth-subtitle">Join the chat today</p>

            <!-- Error -->
            <div id="errorMsg" class="alert-error" role="alert"></div>

            <!-- Form -->
            <form id="registerForm" novalidate>
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input id="fullName" type="text" class="input-field" placeholder="Enter your full name"
                        autocomplete="name" required />
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input id="email" type="email" class="input-field" placeholder="Enter your email"
                        autocomplete="email" required />
                </div>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input id="username" type="text" class="input-field" placeholder="Choose a username"
                        autocomplete="username" required />
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input id="password" type="password" class="input-field"
                        placeholder="Create a password (min 6 chars)" autocomplete="new-password" required />
                </div>
                <button id="submitBtn" type="submit" class="btn btn-primary">Create Account</button>
            </form>

            <p class="auth-footer">
                Already have an account? <a href="login.html">Sign In</a>
            </p>
        </div>
    </div>

    <script type="module">
        import { initTheme, toggleTheme, isDark } from './js/theme.js';
        initTheme();
        const MOON = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
        const SUN = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;
        const btn = document.getElementById('themeBtn');
        btn.innerHTML = isDark() ? SUN : MOON;
        btn.addEventListener('click', () => { toggleTheme(); btn.innerHTML = isDark() ? SUN : MOON; });
    </script>
    <script type="module" src="js/register.js"></script>
</body>

</html>
