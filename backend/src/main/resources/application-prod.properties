# ═══════════════════════════════════════════════════════════
#  PROD Profile — used in production (spring.profiles.active=prod)
#  ALL sensitive values MUST be set as environment variables
#  on your hosting platform (Railway / Render / VPS etc.)
# ═══════════════════════════════════════════════════════════

# ── Database (set these in your hosting platform's env vars) ──
spring.datasource.url=${DATABASE_URL}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# PostgreSQL Dialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# In production: validate only (never auto-alter schema)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# ── CORS — set CORS_ALLOWED_ORIGINS to your frontend URL ──
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://yourdomain.com}

# ── Connection pool tuning ─────────────────────────────────
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── Logging (minimal in prod) ─────────────────────────────
logging.level.root=WARN
logging.level.com.chatapp=INFO
