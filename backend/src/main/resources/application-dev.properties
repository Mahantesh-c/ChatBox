# ═══════════════════════════════════════════════════════════
#  DEV Profile — used locally (spring.profiles.active=dev)
# ═══════════════════════════════════════════════════════════

# Local PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/chatapp
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=password

# PostgreSQL Dialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Auto-create/update tables locally (safe for dev)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# CORS — allow any local port in dev
cors.allowed-origins=http://localhost:*,http://127.0.0.1:*

# Debug logging for local dev
logging.level.com.chatapp=DEBUG
logging.level.org.hibernate.SQL=DEBUG
