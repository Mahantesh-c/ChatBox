spring.application.name=chat-app-backend

# ── Active profile (override with -Dspring.profiles.active=prod in production) ──
spring.profiles.active=dev

# ── JPA / Hibernate (shared) ──────────────────────────────────────────────────
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.h2.console.enabled=false

# ── Security ──────────────────────────────────────────────────────────────────
# In production, set JWT_SECRET as an environment variable
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=86400000

# ── Logging ───────────────────────────────────────────────────────────────────
logging.file.name=spring-boot.log
logging.level.root=INFO
logging.level.com.chatapp=INFO
