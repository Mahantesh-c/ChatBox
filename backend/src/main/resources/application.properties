spring.application.name=chat-app-backend

# ── Port: Railway injects PORT, locally defaults to 8080 ──────────────────────
server.port=${PORT:8080}

# ── Database ──────────────────────────────────────────────────────────────────
# Production (Railway): set DATABASE_URL, DB_USERNAME, DB_PASSWORD as env vars
# Local dev: falls back to local PostgreSQL automatically
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/chatapp}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.h2.console.enabled=false

# ── CORS ──────────────────────────────────────────────────────────────────────
# Production: set CORS_ALLOWED_ORIGINS to your Netlify URL
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*,https://*}
# ── Security ──────────────────────────────────────────────────────────────────
# Production: set JWT_SECRET as a long random env var
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=86400000

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.chatapp=INFO
