spring.application.name=chat-app-backend

# ── Port: Railway injects PORT env var; locally defaults to 8080 ──────────────
server.port=${PORT:8080}

# ── Active profile: set SPRING_PROFILES_ACTIVE=prod on Railway dashboard ──────
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ── JPA / Hibernate (shared) ──────────────────────────────────────────────────
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.h2.console.enabled=false

# ── Security ──────────────────────────────────────────────────────────────────
# In production, set JWT_SECRET as an environment variable
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=86400000

# ── Logging ───────────────────────────────────────────────────────────────────
logging.file.name=spring-boot.log
logging.level.root=INFO
logging.level.com.chatapp=INFO
